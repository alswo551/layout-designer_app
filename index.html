<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>팝업스토어 레이아웃 디자이너</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#F0F4F8;color:#1a1a2e;font-size:14px}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{background:#1F3864;color:#fff;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.header h1{font-size:16px;font-weight:500;flex:1}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:268px;background:#fff;border-right:1px solid #DDE2EC;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.canvas-wrap{flex:1;overflow:hidden;position:relative;background:#E8EDF4}
#canvas{display:block}

/* ── HEADER BUTTONS ── */
.hbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 12px;border-radius:6px;font-size:13px;transition:.15s}
.hbtn:hover{background:rgba(255,255,255,.25)}
.hbtn.accent{background:#2E75B6;border-color:#2E75B6}
.hbtn.accent:hover{background:#1F5A9A}
.hbtn.danger{background:rgba(192,0,0,.7);border-color:rgba(192,0,0,.9)}
.hbtn.danger:hover{background:rgba(192,0,0,.9)}

/* ── SIDEBAR SECTIONS ── */
.sb-section{border-bottom:1px solid #EEF1F8;flex-shrink:0}
.sb-title{padding:9px 14px;font-weight:500;font-size:13px;color:#1F3864;display:flex;justify-content:space-between;align-items:center;background:#F7F9FF;cursor:pointer;user-select:none}
.sb-title .arrow{font-size:11px;transition:.2s}
.sb-body{padding:10px 12px}
.sb-body.collapsed{display:none}

/* ── FORM ELEMENTS ── */
.field{margin-bottom:8px}
.field label{display:block;font-size:11px;color:#666;margin-bottom:3px}
.field input,.field select{width:100%;border:1px solid #DDE2EC;border-radius:5px;padding:5px 8px;font-size:13px;outline:none;background:#fff;color:#1a1a2e}
.field input:focus,.field select:focus{border-color:#4472C4}
.field-row{display:flex;gap:7px}
.field-row .field{flex:1}
.apply-btn{width:100%;background:#1F3864;color:#fff;border:none;border-radius:6px;padding:7px;font-size:13px;margin-top:4px;transition:.15s}
.apply-btn:hover{background:#2E75B6}
.apply-btn.green{background:#375623}
.apply-btn.green:hover{background:#4a7a30}

/* ── COLOR SWATCHES ── */
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-top:6px}
.swatch{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:.1s;flex-shrink:0}
.swatch:hover{transform:scale(1.15)}
.swatch.selected{border-color:#1F3864;box-shadow:0 0 0 1px #fff inset}

/* ── OBJECT LIST ── */
.obj-list{overflow-y:visible;padding:6px 8px}
.obj-row{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:5px;cursor:pointer;margin-bottom:2px;border:1px solid transparent}
.obj-row:hover{background:#F0F4FF}
.obj-row.sel{background:#E8EEFF;border-color:#4472C4}
.obj-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.obj-info{flex:1;min-width:0}
.obj-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.obj-dim{font-size:10px;color:#888}
.obj-del{background:none;border:none;color:#ccc;font-size:14px;padding:0 2px;line-height:1;opacity:0}
.obj-row:hover .obj-del{opacity:1}
.obj-del:hover{color:#C00000}

/* ── PROPS PANEL ── */
.props-header{padding:9px 14px;font-weight:500;font-size:13px;color:#1F3864;background:#FFF8EE;border-bottom:1px solid #FFDDA0;display:flex;justify-content:space-between;align-items:center}
.props-body{padding:10px 12px}
.props-empty{padding:14px;text-align:center;color:#AAB;font-size:12px}

/* ── ZOOM ── */
.zoom-bar{position:absolute;bottom:12px;right:12px;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #DDE2EC;border-radius:20px;padding:4px 10px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:10}
.zoom-bar button{background:none;border:none;font-size:16px;color:#1F3864;padding:0 4px;line-height:1}
.zoom-bar span{font-size:12px;color:#555;min-width:42px;text-align:center}

/* ── TOOLTIP ── */
.tip{position:absolute;background:rgba(31,56,100,.85);color:#fff;font-size:11px;padding:3px 8px;border-radius:4px;pointer-events:none;display:none;z-index:20}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#CBD2E0;border-radius:3px}

/* ── MOBILE RESPONSIVE ── */
.menu-toggle{display:none;background:none;border:none;color:#fff;font-size:26px;padding:2px 8px;line-height:1;cursor:pointer;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;-webkit-tap-highlight-color:transparent}
.sb-overlay.show{display:block}

@media(max-width:900px){
  .menu-toggle{display:block}

  /* 헤더 */
  .header{padding:8px 10px;gap:6px;flex-wrap:nowrap;overflow:hidden}
  .header h1{font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:1}
  .hbtn{padding:7px 10px;font-size:12px;touch-action:manipulation;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0}
  .hbtn.danger{display:none} /* 전체초기화: 사이드바 이용 */

  /* 사이드바 슬라이드 오버레이 */
  .sidebar{
    position:fixed;left:-280px;top:0;bottom:0;z-index:100;
    transition:left .25s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 28px rgba(0,0,0,.28);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:env(safe-area-inset-bottom,0)
  }
  .sidebar.open{left:0}

  /* 입력 필드 (iOS 자동확대 방지) */
  .field input,.field select{font-size:16px;padding:9px 10px;min-height:46px;-webkit-appearance:none}
  .field label{font-size:12px}
  .apply-btn{padding:12px;font-size:14px;min-height:48px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .add-row{gap:8px}
  .color-grid{gap:7px}
  .swatch{width:32px;height:32px;border-radius:6px}

  /* 오브젝트 목록 */
  .obj-row{padding:9px 6px;min-height:48px;-webkit-tap-highlight-color:transparent}
  .obj-del{opacity:1;font-size:20px;padding:0 8px;min-width:40px;min-height:40px;text-align:center;touch-action:manipulation}
  .obj-name{font-size:13px}
  .obj-dim{font-size:10px}

  /* 속성 패널 */
  .props-body .field input{font-size:16px;min-height:46px}

  /* 줌 바 */
  .zoom-bar{
    bottom:max(14px,env(safe-area-inset-bottom,14px));
    right:14px;padding:6px 12px;border-radius:24px
  }
  .zoom-bar button{font-size:22px;padding:0 8px;min-width:40px;min-height:40px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .zoom-bar span{font-size:13px;min-width:46px}

  /* 캔버스 */
  .canvas-wrap{width:100%;touch-action:none;-webkit-user-select:none;user-select:none}
}

@media(max-width:480px){
  .header h1{display:none}
  .hbtn{padding:6px 8px;font-size:11px}
  #saveHtmlBtn,#clearBtn{display:none} /* HTML저장·초기화 숨김 */
}
/* ── IMAGE PREVIEW MODAL ── */
#ipOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center;padding:24px}
#ipOv.open{display:flex}
.ipbox{background:#fff;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;width:min(680px,90vw);max-height:80vh;box-shadow:0 16px 48px rgba(0,0,0,.35)}
.ipbox-hdr{background:#1F3864;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ipbox-hdr h3{font-size:14px;font-weight:500;flex:1;margin:0}
.iph-fname{font-size:11px;opacity:.65;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.ipbox-body{overflow:auto;flex:1;padding:14px;background:#E8EDF4;display:flex;justify-content:center;align-items:flex-start;-webkit-overflow-scrolling:touch;max-height:50vh}
.ipbox-body img{max-width:100%;height:auto;border-radius:5px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.ipbox-hint-mob{display:none;font-size:12px;color:#4a4a00;background:#FFFBE6;border-top:1px solid #FFD700;padding:8px 14px;text-align:center;line-height:1.5;flex-shrink:0}
.ipbox-footer{padding:14px 16px;border-top:1px solid #E8ECF4;display:flex;gap:10px;align-items:center;flex-shrink:0}
.iph-hint{font-size:11px;color:#aaa;flex:1}
.ip-btn{border:none;padding:10px 22px;border-radius:7px;font-size:14px;font-family:inherit;cursor:pointer;min-height:46px;font-weight:500;touch-action:manipulation;transition:.15s}
.ip-btn-cancel{background:#f0f0f0;color:#444;border:1px solid #ddd}
.ip-btn-cancel:hover{background:#e0e0e0}
.ip-btn-save{background:#1F3864;color:#fff}
.ip-btn-save:hover{background:#2E75B6}
.ip-btn-share{background:#375623;color:#fff;display:none}
.ip-btn-share:hover{background:#4a7a30}
@media(max-width:600px){
  #ipOv{padding:10px}
  .ipbox{width:100%;max-height:88vh}
  .ipbox-body{max-height:44vh;padding:10px}
  .ipbox-hint-mob{display:block}
  .ipbox-footer{gap:8px;padding:10px 12px}
  .iph-hint{display:none}
  .ip-btn{flex:1;padding:12px 8px;font-size:14px;min-height:50px}
}
</style>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1F3864">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="레이아웃 디자이너">

<body>
<div id="app">
  <div class="sb-overlay" id="sbOverlay"></div>
  <header class="header">
    <button class="menu-toggle" id="menuToggle">☰</button>
    <h1>팝업스토어 레이아웃 디자이너</h1>
    <button class="hbtn accent" id="exportBtn">이미지 저장</button>
    <button class="hbtn" id="saveJsonBtn">저장</button>
    <button class="hbtn" id="loadJsonBtn">불러오기</button>
    <input type="file" id="jsonFile" accept=".json" style="display:none">
    <button class="hbtn" id="saveHtmlBtn">HTML 저장</button>
    <button class="hbtn danger" id="clearBtn">전체 초기화</button>
  </header>
  <div class="body">
    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- 공간 설정 -->
      <div class="sb-section">
        <div class="sb-title" onclick="toggleSb('roomBody',this)">
          <span>공간 설정</span><span class="arrow">▾</span>
        </div>
        <div class="sb-body" id="roomBody">
          <div class="field-row">
            <div class="field"><label>가로 (mm)</label><input type="number" id="roomW" value="6000" min="100" step="100"></div>
            <div class="field"><label>세로 (mm)</label><input type="number" id="roomH" value="4000" min="100" step="100"></div>
          </div>
          <div class="field">
            <label>격자 단위 (mm)</label>
            <select id="gridSel">
              <option value="50" selected>50mm (5cm)</option>
              <option value="100">100mm (10cm)</option>
              <option value="200">200mm (20cm)</option>
              <option value="500">500mm (50cm)</option>
              <option value="1000">1000mm (100cm)</option>
            </select>
          </div>
          <button class="apply-btn" id="applyRoom">공간 적용</button>
        </div>
      </div>

      <!-- 오브젝트 추가 -->
      <div class="sb-section">
        <div class="sb-title" onclick="toggleSb('addBody',this)">
          <span>오브젝트 추가</span><span class="arrow">▾</span>
        </div>
        <div class="sb-body" id="addBody">
          <div class="field"><label>이름 (라벨)</label><input type="text" id="newLabel" placeholder="예: 진열대 A" maxlength="20"></div>
          <div class="field-row">
            <div class="field"><label>가로 (mm)</label><input type="number" id="newW" value="1000" min="50" step="50"></div>
            <div class="field"><label>세로 (mm)</label><input type="number" id="newH" value="500" min="50" step="50"></div>
          </div>
          <div class="field"><label>색상</label>
            <div class="color-grid" id="addColorGrid"></div>
          </div>
          <button class="apply-btn green" id="addObjBtn">오브젝트 추가</button>
        </div>
      </div>

      <!-- 선택 오브젝트 속성 -->
      <div class="sb-section" id="propsSection" style="display:none">
        <div class="props-header">
          <span id="propsTitle">속성</span>
          <button style="background:none;border:none;color:#C00000;font-size:12px;cursor:pointer" id="deleteSelBtn">삭제</button>
        </div>
        <div class="props-body">
          <div class="field"><label>이름</label><input type="text" id="propLabel" maxlength="20"></div>
          <div class="field-row">
            <div class="field"><label>가로 (mm)</label><input type="number" id="propW" min="50" step="50"></div>
            <div class="field"><label>세로 (mm)</label><input type="number" id="propH" min="50" step="50"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>X 위치 (mm)</label><input type="number" id="propX" min="0" step="50"></div>
            <div class="field"><label>Y 위치 (mm)</label><input type="number" id="propY" min="0" step="50"></div>
          </div>
          <div class="field"><label>색상</label>
            <div class="color-grid" id="propColorGrid"></div>
          </div>
          <div class="field"><label>회전</label>
            <div style="display:flex;align-items:center;gap:8px">
              <span id="propRot" style="font-size:13px;min-width:36px;color:#1F3864;font-weight:500">0°</span>
              <button class="apply-btn" style="background:#375623;margin:0;flex:1" id="rotateCCWBtn">↺ -90°</button>
              <button class="apply-btn" style="background:#375623;margin:0;flex:1" id="rotateCWBtn">↻ +90°</button>
            </div>
          </div>
          <div style="display:flex;gap:6px;margin-top:2px">
            <button class="apply-btn" style="background:#4472C4;margin:0" id="bringFrontBtn">앞으로</button>
            <button class="apply-btn" style="background:#888;margin:0" id="sendBackBtn">뒤로</button>
          </div>
        </div>
      </div>

      <!-- 오브젝트 목록 -->
      <div style="border-bottom:1px solid #EEF1F8;background:#F7F9FF;padding:9px 14px;font-weight:500;font-size:13px;color:#1F3864;flex-shrink:0">
        오브젝트 목록 <span id="objCount" style="font-size:11px;color:#888;font-weight:400"></span>
      </div>
      <div class="obj-list" id="objList"></div>

    </aside>

    <!-- CANVAS AREA -->
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
      <div class="zoom-bar">
        <button id="zoomOut">−</button>
        <span id="zoomLbl">100%</span>
        <button id="zoomIn">+</button>
        <button id="zoomFit" style="font-size:11px;color:#1F3864;padding:0 4px">맞춤</button>
      </div>
      <div class="tip" id="tip"></div>
    </div>
  </div>
</div>

<script>
// ── PALETTE ──
const PALETTE = [
  '#4472C4','#2E75B6','#70AD47','#ED7D31',
  '#FFC000','#FF0000','#7030A0','#00B0F0',
  '#375623','#843C0C','#1F3864','#FF6699',
  '#A9D18E','#FFE699','#D9D9D9','#595959'
];

// ── STATE ──
let room = {w:6000, h:4000};
let gridMM = 100; // 시각 격자 (별도)
let objects = [];
let nextId = 1;
let selectedId = null;
let zoom = 1;        // display scale multiplier (user controlled)
let fitScale = 1;    // scale to fit room in canvas
let offsetX = 0, offsetY = 0; // canvas room offset in px
let dragging = null; // {id, startMX, startMY, startObjX, startObjY}
let newObjColor = PALETTE[0];
let propObjColor = PALETTE[0];

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

// ── PERSISTENCE ──
function saveLS(){ try{localStorage.setItem('layoutApp',JSON.stringify({room,gridMM,objects,nextId}))}catch(e){} }
function loadLS(){
  try{
    const d=localStorage.getItem('layoutApp');
    if(!d) return;
    const p=JSON.parse(d);
    room=p.room||room; gridMM=p.gridMM||gridMM;
    objects=p.objects||[]; nextId=p.nextId||1;
    document.getElementById('roomW').value=room.w;
    document.getElementById('roomH').value=room.h;
    document.getElementById('gridSel').value=gridMM;
  }catch(e){}
}

// ── SCALE / COORDINATE ──
function recalcFit(){
  const cw=wrap.clientWidth, ch=wrap.clientHeight;
  canvas.width=cw; canvas.height=ch;
  const pad=60;
  fitScale=Math.min((cw-pad*2)/room.w,(ch-pad*2)/room.h);
}
function scale(){ return fitScale*zoom; }
function roomPxW(){ return room.w*scale(); }
function roomPxH(){ return room.h*scale(); }
function roomOrigin(){
  return {
    x:(canvas.width-roomPxW())/2,
    y:(canvas.height-roomPxH())/2
  };
}
function canvasToMM(cx,cy){
  const o=roomOrigin();
  return {x:(cx-o.x)/scale(), y:(cy-o.y)/scale()};
}
function snapMM(v){ return Math.round(v/50)*50; } // 스냅 50mm 고정
function dispW(o){ return (o.rotation||0)%180===0 ? o.w : o.h; }
function dispH(o){ return (o.rotation||0)%180===0 ? o.h : o.w; }
function clampObj(o){
  o.x=Math.max(0,Math.min(room.w-dispW(o),o.x));
  o.y=Math.max(0,Math.min(room.h-dispH(o),o.y));
}

function getObjAt(cx,cy){
  const mm=canvasToMM(cx,cy);
  for(let i=objects.length-1;i>=0;i--){
    const o=objects[i];
    if(mm.x>=o.x&&mm.x<=o.x+dispW(o)&&mm.y>=o.y&&mm.y<=o.y+dispH(o)) return o;
  }
  return null;
}

// ── RENDER ──
function render(){
  const cw=canvas.width, ch=canvas.height;
  const s=scale();
  const {x:ox,y:oy}=roomOrigin();

  // BG
  ctx.fillStyle='#E8EDF4';
  ctx.fillRect(0,0,cw,ch);

  // Room shadow
  ctx.shadowColor='rgba(0,0,0,.18)';
  ctx.shadowBlur=16; ctx.shadowOffsetX=3; ctx.shadowOffsetY=3;
  ctx.fillStyle='#fff';
  ctx.fillRect(ox,oy,roomPxW(),roomPxH());
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;

  // Grid -- 100mm 고정 격자 (500mm마다 굵은 선)
  const VGRID=100, MAJOR=500;
  for(let x=0;x<=room.w;x+=VGRID){
    const maj=x%MAJOR===0;
    ctx.strokeStyle=maj?'rgba(140,158,190,.9)':'rgba(200,210,228,.6)';
    ctx.lineWidth=maj?1:0.4;
    ctx.beginPath(); ctx.moveTo(ox+x*s,oy); ctx.lineTo(ox+x*s,oy+roomPxH()); ctx.stroke();
  }
  for(let y=0;y<=room.h;y+=VGRID){
    const maj=y%MAJOR===0;
    ctx.strokeStyle=maj?'rgba(140,158,190,.9)':'rgba(200,210,228,.6)';
    ctx.lineWidth=maj?1:0.4;
    ctx.beginPath(); ctx.moveTo(ox,oy+y*s); ctx.lineTo(ox+roomPxW(),oy+y*s); ctx.stroke();
  }
  // 눈금 레이블 500mm마다
  ctx.fillStyle='rgba(100,120,160,.65)';
  ctx.font=`${Math.max(9,Math.min(11,s*0.15))}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  for(let x=MAJOR;x<=room.w;x+=MAJOR){ ctx.fillText(x+'',ox+x*s,oy+3); }
  ctx.textAlign='right'; ctx.textBaseline='middle';
  for(let y=MAJOR;y<=room.h;y+=MAJOR){ ctx.fillText(y+'',ox-4,oy+y*s); }

  // Room border
  ctx.strokeStyle='#1F3864';
  ctx.lineWidth=2;
  ctx.strokeRect(ox,oy,roomPxW(),roomPxH());

  // Room dimension label
  ctx.fillStyle='#1F3864';
  ctx.font='bold 12px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText(`${room.w} × ${room.h} mm`, ox+roomPxW()/2, oy-6);

  // Objects
  objects.forEach(o=>{
    const rot=(o.rotation||0);
    const pw=dispW(o)*s, ph=dispH(o)*s;
    const px=ox+o.x*s, py=oy+o.y*s;
    const isSel = o.id===selectedId;
    const cx=px+pw/2, cy=py+ph/2;

    // Fill
    ctx.fillStyle=o.color;
    ctx.fillRect(px,py,pw,ph);

    // Hatch pattern for selected
    if(isSel){
      ctx.save();
      ctx.beginPath(); ctx.rect(px,py,pw,ph); ctx.clip();
      ctx.strokeStyle='rgba(255,255,255,.25)';
      ctx.lineWidth=1;
      for(let i=-ph;i<pw;i+=12){
        ctx.beginPath(); ctx.moveTo(px+i,py); ctx.lineTo(px+i+ph,py+ph); ctx.stroke();
      }
      ctx.restore();
    }

    // Border
    ctx.strokeStyle=isSel?'#FF8C00':darken(o.color,50);
    ctx.lineWidth=isSel?2.5:1;
    ctx.strokeRect(px,py,pw,ph);

    // 회전 배지 (0° 아닐 때)
    if(rot!==0){
      ctx.save();
      ctx.fillStyle='rgba(0,0,0,.55)';
      ctx.font='bold 9px sans-serif';
      ctx.textAlign='right'; ctx.textBaseline='top';
      ctx.fillText(rot+'°', px+pw-3, py+3);
      ctx.restore();
    }

    // Label (항상 정방향 고정)
    const textColor=luminance(o.color)>0.5?'#333':'#fff';
    ctx.save();
    ctx.beginPath(); ctx.rect(px+3,py+3,pw-6,ph-6); ctx.clip();
    ctx.fillStyle=textColor;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const maxFontPx=Math.min(pw/Math.max(1,o.label.length)*1.6, ph*0.4, 16);
    const fontSize=Math.max(9,maxFontPx);
    ctx.font=`500 ${fontSize}px '맑은 고딕',sans-serif`;
    ctx.fillText(o.label||'', cx, cy);
    ctx.restore();

    // Dimension text
    if(isSel||pw>60){
      ctx.fillStyle='rgba(0,0,0,.45)';
      ctx.font=`9px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(`${dispW(o)}×${dispH(o)}mm`, cx, py+ph+3);
    }

    // Selection handles
    if(isSel){
      const hs=6;
      [[px,py],[cx,py],[px+pw,py],
       [px,cy],         [px+pw,cy],
       [px,py+ph],[cx,py+ph],[px+pw,py+ph]].forEach(([hx,hy])=>{
        ctx.fillStyle='#fff'; ctx.fillRect(hx-hs/2,hy-hs/2,hs,hs);
        ctx.strokeStyle='#FF8C00'; ctx.lineWidth=1.5; ctx.strokeRect(hx-hs/2,hy-hs/2,hs,hs);
      });
    }
  });
}

function darken(hex,amt){
  const r=Math.max(0,parseInt(hex.slice(1,3),16)-amt);
  const g=Math.max(0,parseInt(hex.slice(3,5),16)-amt);
  const b=Math.max(0,parseInt(hex.slice(5,7),16)-amt);
  return `rgb(${r},${g},${b})`;
}
function luminance(hex){
  const r=parseInt(hex.slice(1,3),16)/255;
  const g=parseInt(hex.slice(3,5),16)/255;
  const b=parseInt(hex.slice(5,7),16)/255;
  return 0.299*r+0.587*g+0.114*b;
}

// ── MOUSE EVENTS ──
function getPos(e){
  const r=canvas.getBoundingClientRect();
  return {x:e.clientX-r.left,y:e.clientY-r.top};
}

canvas.addEventListener('mousedown',e=>{
  const pos=getPos(e);
  const obj=getObjAt(pos.x,pos.y);
  if(obj){
    selectedId=obj.id;
    dragging={id:obj.id,startMX:pos.x,startMY:pos.y,startObjX:obj.x,startObjY:obj.y};
    canvas.style.cursor='grabbing';
  } else {
    selectedId=null;
  }
  updatePropsPanel();
  updateObjList();
  render();
});

canvas.addEventListener('mousemove',e=>{
  const pos=getPos(e);
  if(dragging){
    const s=scale();
    const dx=(pos.x-dragging.startMX)/s;
    const dy=(pos.y-dragging.startMY)/s;
    const obj=objects.find(o=>o.id===dragging.id);
    if(obj){
      obj.x=dragging.startObjX+dx;
      obj.y=dragging.startObjY+dy;
      clampObj(obj);
      render();
      showTip(e, `${Math.round(obj.x)}, ${Math.round(obj.y)} mm`);
    }
    return;
  }
  const obj=getObjAt(pos.x,pos.y);
  canvas.style.cursor=obj?'grab':'default';
  hideTip();
});

canvas.addEventListener('mouseup',()=>{
  if(dragging){
    const obj=objects.find(o=>o.id===dragging.id);
    if(obj){
      obj.x=snapMM(obj.x); obj.y=snapMM(obj.y);
      clampObj(obj);
      updatePropsPanel();
      saveLS();
    }
    dragging=null;
    canvas.style.cursor='default';
    hideTip();
    render();
  }
});

canvas.addEventListener('mouseleave',()=>{
  if(dragging){
    const obj=objects.find(o=>o.id===dragging.id);
    if(obj){ obj.x=snapMM(obj.x); obj.y=snapMM(obj.y); clampObj(obj); saveLS(); }
    dragging=null; hideTip(); render();
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Delete'||e.key==='Backspace'){
    if(selectedId&&document.activeElement.tagName!=='INPUT'){
      deleteSelected();
    }
  }
  if(e.key==='Escape'){ selectedId=null; updatePropsPanel(); updateObjList(); render(); }
  if((e.key==='r'||e.key==='R')&&document.activeElement.tagName!=='INPUT'){ rotateObj(90); }
});

function showTip(e,text){
  const tip=document.getElementById('tip');
  tip.textContent=text; tip.style.display='block';
  const r=wrap.getBoundingClientRect();
  tip.style.left=(e.clientX-r.left+12)+'px';
  tip.style.top=(e.clientY-r.top-24)+'px';
}
function hideTip(){ document.getElementById('tip').style.display='none'; }

// ── TOUCH EVENTS FOR CANVAS ──
function getTouchPos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0]||e.changedTouches[0];
  return {x:t.clientX-r.left, y:t.clientY-r.top};
}
let lastPinchDist=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const pos=getTouchPos(e);
    const obj=getObjAt(pos.x,pos.y);
    if(obj){
      selectedId=obj.id;
      dragging={id:obj.id,startMX:pos.x,startMY:pos.y,startObjX:obj.x,startObjY:obj.y};
    } else { selectedId=null; }
    updatePropsPanel(); updateObjList(); render();
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    // 핀치 줌
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lastPinchDist) setZoom(zoom*(dist/lastPinchDist));
    lastPinchDist=dist;
    return;
  }
  lastPinchDist=null;
  if(!dragging||e.touches.length!==1) return;
  const pos=getTouchPos(e);
  const s=scale();
  const dx=(pos.x-dragging.startMX)/s;
  const dy=(pos.y-dragging.startMY)/s;
  const obj=objects.find(o=>o.id===dragging.id);
  if(obj){
    obj.x=dragging.startObjX+dx;
    obj.y=dragging.startObjY+dy;
    clampObj(obj);
    render();
    showTip(e.touches[0], `${Math.round(obj.x)}, ${Math.round(obj.y)} mm`);
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  lastPinchDist=null;
  if(dragging){
    const obj=objects.find(o=>o.id===dragging.id);
    if(obj){ obj.x=snapMM(obj.x); obj.y=snapMM(obj.y); clampObj(obj); updatePropsPanel(); saveLS(); }
    dragging=null; hideTip(); render();
  }
},{passive:false});

// showTip 터치용 오버로드
function showTip(src,text){
  const tip=document.getElementById('tip');
  tip.textContent=text; tip.style.display='block';
  const r=wrap.getBoundingClientRect();
  const cx=((src&&src.clientX)||0)-r.left;
  const cy=((src&&src.clientY)||0)-r.top;
  tip.style.left=Math.min(cx+12, r.width-80)+'px';
  tip.style.top=Math.max(cy-28, 4)+'px';
}

// ── ZOOM ──
function setZoom(z){
  zoom=Math.max(.2,Math.min(4,z));
  document.getElementById('zoomLbl').textContent=Math.round(zoom*100)+'%';
  render();
}
document.getElementById('zoomIn').onclick=()=>setZoom(zoom*1.25);
document.getElementById('zoomOut').onclick=()=>setZoom(zoom/1.25);
document.getElementById('zoomFit').onclick=()=>setZoom(1);
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  setZoom(zoom*(e.deltaY<0?1.1:0.9));
},{passive:false});

// ── ROOM APPLY ──
document.getElementById('applyRoom').onclick=()=>{
  const w=+document.getElementById('roomW').value;
  const h=+document.getElementById('roomH').value;
  if(w>=100&&h>=100){ room={w,h}; }
  gridMM=+document.getElementById('gridSel').value;
  recalcFit(); setZoom(1); saveLS(); render();
};

// ── ADD OBJECT ──
document.getElementById('addObjBtn').onclick=()=>{
  const label=document.getElementById('newLabel').value.trim()||'오브젝트';
  const w=+document.getElementById('newW').value||500;
  const h=+document.getElementById('newH').value||500;
  if(w<50||h<50){ alert('크기는 최소 50mm 이상이어야 합니다.'); return; }
  const obj={id:nextId++,label,w:Math.min(w,room.w),h:Math.min(h,room.h),x:0,y:0,color:newObjColor,rotation:0};
  objects.push(obj);
  selectedId=obj.id;
  updatePropsPanel(); updateObjList(); saveLS(); render();
};

// ── DELETE ──
function deleteSelected(){
  objects=objects.filter(o=>o.id!==selectedId);
  selectedId=null;
  updatePropsPanel(); updateObjList(); saveLS(); render();
}
document.getElementById('deleteSelBtn').onclick=deleteSelected;

// ── PROPS PANEL ──
function updatePropsPanel(){
  const sec=document.getElementById('propsSection');
  const obj=objects.find(o=>o.id===selectedId);
  if(!obj){ sec.style.display='none'; return; }
  sec.style.display='block';
  document.getElementById('propsTitle').textContent=`"${obj.label}" 속성`;
  document.getElementById('propLabel').value=obj.label;
  document.getElementById('propW').value=obj.w;
  document.getElementById('propH').value=obj.h;
  document.getElementById('propX').value=obj.x;
  document.getElementById('propY').value=obj.y;
  document.getElementById('propRot').textContent=(obj.rotation||0)+'°';
  propObjColor=obj.color;
  function refreshPropSwatches(){
    buildSwatches('propColorGrid', propObjColor, function(color){
      propObjColor = color;
      const o = objects.find(o => o.id === selectedId);
      if(o){ o.color = color; saveLS(); render(); updateObjList(); }
      refreshPropSwatches();
    });
  }
  refreshPropSwatches();
}

['propLabel','propW','propH','propX','propY'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{
    const obj=objects.find(o=>o.id===selectedId);
    if(!obj) return;
    obj.label=document.getElementById('propLabel').value.trim()||obj.label;
    obj.w=Math.max(50,+document.getElementById('propW').value||50);
    obj.h=Math.max(50,+document.getElementById('propH').value||50);
    obj.x=Math.max(0,+document.getElementById('propX').value||0);
    obj.y=Math.max(0,+document.getElementById('propY').value||0);
    clampObj(obj);
    document.getElementById('propsTitle').textContent=`"${obj.label}" 속성`;
    saveLS(); render(); updateObjList();
  });
});

function rotateObj(deg){
  const obj=objects.find(o=>o.id===selectedId);
  if(!obj) return;
  obj.rotation=((obj.rotation||0)+deg+360)%360;
  clampObj(obj);
  document.getElementById('propRot').textContent=obj.rotation+'°';
  updateObjList(); saveLS(); render();
}
document.getElementById('rotateCWBtn').onclick=()=>rotateObj(90);
document.getElementById('rotateCCWBtn').onclick=()=>rotateObj(-90);
document.getElementById('bringFrontBtn').onclick=()=>{
  const i=objects.findIndex(o=>o.id===selectedId);
  if(i<objects.length-1){ objects.push(objects.splice(i,1)[0]); saveLS(); render(); }
};
document.getElementById('sendBackBtn').onclick=()=>{
  const i=objects.findIndex(o=>o.id===selectedId);
  if(i>0){ objects.unshift(objects.splice(i,1)[0]); saveLS(); render(); }
};

// ── OBJECT LIST ──
function updateObjList(){
  const list=document.getElementById('objList');
  document.getElementById('objCount').textContent=`(${objects.length}개)`;
  if(!objects.length){ list.innerHTML='<div style="padding:12px;text-align:center;color:#AAB;font-size:12px">오브젝트 없음</div>'; return; }
  list.innerHTML=objects.slice().reverse().map(o=>`
    <div class="obj-row${o.id===selectedId?' sel':''}" onclick="selectObj(${o.id})">
      <div class="obj-dot" style="background:${o.color}"></div>
      <div class="obj-info">
        <div class="obj-name">${o.label}</div>
        <div class="obj-dim">${dispW(o)}×${dispH(o)}mm${o.rotation?'  ↻'+o.rotation+'°':''} &nbsp; @${o.x},${o.y}</div>
      </div>
      <button class="obj-del" onclick="event.stopPropagation();deleteObj(${o.id})">✕</button>
    </div>
  `).join('');
}

function selectObj(id){ selectedId=id; updatePropsPanel(); updateObjList(); render(); }
function deleteObj(id){
  objects=objects.filter(o=>o.id!==id);
  if(selectedId===id){ selectedId=null; updatePropsPanel(); }
  updateObjList(); saveLS(); render();
}

// ── COLOR SWATCHES ──
function buildSwatches(containerId, selectedColor, onPick){
  const grid = document.getElementById(containerId);
  if(!grid) return;
  grid.innerHTML = PALETTE.map(color =>
    `<div class="swatch${color===selectedColor?' selected':''}" style="background:${color}" data-color="${color}"></div>`
  ).join('');
  grid.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      onPick(sw.dataset.color);
    });
  });
}


// ── EXPORT IMAGE ──
(function(){
  /* 버튼은 HTML에서 스크립트보다 뒤에 있으므로 DOMContentLoaded 보장 */
  var bindExport = function(){
    var ov=document.getElementById('ipOv');
    var imgEl=document.getElementById('ipImg');
    var fnEl=document.getElementById('ipFname');
    var mhEl=document.getElementById('ipMHint');
    var saveBtn=document.getElementById('ipSave');
    var shareBtn=document.getElementById('ipShare');
    var cancelBtn=document.getElementById('ipCancel');
    if(!ov||!saveBtn||!cancelBtn){ return; }
    var _url=null,_fname=null;
    function isMob(){return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);}
    function closeIP(){ov.classList.remove('open');_url=null;_fname=null;}
    document.getElementById('exportBtn').onclick=function(){
      var ps=selectedId; selectedId=null;
      var pz=zoom; zoom=1; recalcFit(); // 전체 fit
      // 고화질 캡처: 캔버스를 2x 크기로 임시 확대 후 렌더링
      var dpr=Math.max(window.devicePixelRatio||1, 2);
      var origW=canvas.width, origH=canvas.height;
      canvas.width=origW*dpr; canvas.height=origH*dpr;
      recalcFit(); render(); // 2x 해상도로 렌더
      var d=new Date();
      var st=d.getFullYear()+''+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
      _fname='팝업스토어_레이아웃_'+room.w+'x'+room.h+'mm_'+st+'.png';
      _url=canvas.toDataURL('image/png');
      // 캔버스 원복
      canvas.width=origW; canvas.height=origH;
      selectedId=ps; zoom=pz; recalcFit(); render();
      imgEl.src=_url;fnEl.textContent=_fname;
      var mob=isMob();
      var hs=mob&&typeof navigator.share==='function'&&typeof navigator.canShare==='function';
      shareBtn.style.display=hs?'':'none';
      saveBtn.style.display=hs?'none':'';
      mhEl.style.display=mob?'block':'none';
      ov.classList.add('open');
    };
    saveBtn.onclick=function(){
      if(!_url)return;
      var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();
      closeIP();
    };
    shareBtn.onclick=function(){
      if(!_url)return;
      fetch(_url).then(function(r){return r.blob();}).then(function(b){
        var f=new File([b],_fname,{type:'image/png'});
        if(navigator.canShare&&navigator.canShare({files:[f]})){
          navigator.share({files:[f],title:'팝업스토어 레이아웃'}).catch(function(e){
            if(e.name!=='AbortError'){var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();}
          });
        }else{var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();}
      }).catch(function(){var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();});
      closeIP();
    };
    cancelBtn.onclick=closeIP;
    ov.addEventListener('click',function(e){if(e.target===ov)closeIP();});
  };
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',bindExport);
  } else {
    bindExport();
  }
})();

// ── SAVE / LOAD JSON ──
document.getElementById('saveJsonBtn').onclick=()=>{
  const data=JSON.stringify({room,gridMM,objects,nextId},null,2);
  const url=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  const a=document.createElement('a'); a.href=url;
  a.download=`레이아웃_백업.json`; a.click(); URL.revokeObjectURL(url);
};
document.getElementById('loadJsonBtn').onclick=()=>document.getElementById('jsonFile').click();
document.getElementById('jsonFile').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(p.room&&p.objects){
        room=p.room; gridMM=p.gridMM||500; objects=p.objects; nextId=p.nextId||objects.length+1;
        document.getElementById('roomW').value=room.w;
        document.getElementById('roomH').value=room.h;
        document.getElementById('gridSel').value=gridMM;
        selectedId=null;
        recalcFit(); setZoom(1);
        updatePropsPanel(); updateObjList(); saveLS(); render();
        alert('불러오기 완료!');
      } else alert('올바른 파일이 아닙니다.');
    }catch{ alert('파일 읽기 오류'); }
    e.target.value='';
  };
  r.readAsText(f);
};

document.getElementById('clearBtn').onclick=()=>{
  if(!confirm('모든 오브젝트를 초기화할까요?')) return;
  objects=[]; nextId=1; selectedId=null;
  updatePropsPanel(); updateObjList(); saveLS(); render();
};

const ro=new ResizeObserver(()=>{ recalcFit(); render(); });
ro.observe(wrap);

// ── INIT ──
function refreshAddSwatches(){
  buildSwatches('addColorGrid', newObjColor, function(color){
    newObjColor = color;
    refreshAddSwatches();
  });
}
refreshAddSwatches();
loadLS();
recalcFit();
setZoom(1);

render();
